buildscript {
    ext {
        springBootVersion = '3.5.0'
    }
    dependencies {
        classpath("org.springframework.boot:spring-boot-gradle-plugin:${springBootVersion}")
    }
}

plugins {
    id 'org.springframework.boot' version '3.5.0'
    id 'io.spring.dependency-management' version '1.0.14.RELEASE'
    id 'com.example.some-plugin' version 'latest.release'
    id 'org.sonarqube' version '6.1.0.5360'
    id 'java-library'
}

group = 'com.example'
version = '0.0.1-SNAPSHOT'
sourceCompatibility = JavaVersion.VERSION_21
targetCompatibility = JavaVersion.VERSION_21

configurations {
    customTools
    compileOnly {
        extendsFrom annotationProcessor
    }
}

repositories {
    mavenCentral()
}

dependencies {
    compileOnly 'org.projectlombok:lombok:1.18.32'
    annotationProcessor 'org.projectlombok:lombok:1.18.32'
    implementation 'org.hibernate:hibernate-java8:6.0.0.Alpha7'
    implementation 'org.springframework.boot:spring-boot-starter-actuator'
    implementation 'org.springframework.boot:spring-boot-starter-cache'
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-web-services'
    annotationProcessor 'org.springframework.boot:spring-boot-configuration-processor'
    implementation 'com.h2database:h2:2.2.220'
    implementation 'log4j:log4j:1.2.17'

    implementation group: 'org.springframework', name: 'spring-jms'
    compileOnly 'jakarta.jms:jakarta.jms-api:3.1.0'
    implementation(group: 'com.ibm.mq', name: 'mq-jms-spring-boot-starter', version: '3.0.0') {
        exclude group: 'org.apache.logging.log4j', module: 'log4j-to-slf4j'
    }

    implementation(group: 'com.oracle.database.jdbc', name: 'ojdbc8', version: '21.9.0.0')

    customTools 'org.apache.cxf:cxf-tools:4.0.0',
            'org.apache.cxf:cxf-tools-wsdlto-databinding-jaxb:4.0.0',
            'org.apache.cxf:cxf-tools-wsdlto-frontend-jaxws:4.0.0'

    implementation(group: 'org.ehcache', name: 'ehcache', version: '3.10.0') {
        transitive = false
    }
    implementation(group: 'javax.cache', name: 'cache-api', version: '1.1.1') {
        transitive = false
    }
    implementation(group: 'javax.xml.bind', name: 'jaxb-api', version: '2.3.1')
    implementation(group: 'com.sun.xml.bind', name: 'jaxb-impl', version: '2.3.7')

    implementation('com.example.shared:shared-location-api:3.0.+') {
        exclude group: 'org.apache.logging.log4j', module: 'log4j-api'
        exclude group: 'org.apache.logging.log4j', module: 'log4j-core'
        exclude group: 'org.apache.logging.log4j', module: 'log4j-slf4j-impl'
    }

    implementation 'com.example.shared:config-starter:3.3.0'
    implementation 'com.example.shared:user-api:3.0.+'
    implementation 'com.example.shared:user-ldap:3.0.+'
    implementation 'com.example.shared:file-api:3.0.1'
    implementation 'org.apache.commons:commons-lang3:3.18.0'

    implementation('com.example.shared:file-smbj:3.0.3') {
        exclude group: 'org.apache.logging.log4j'
        exclude group: 'com.hierynomus'
    }

    implementation 'com.hierynomus:smbj:0.11.5'
    implementation 'com.example.problem:problem-details-spring:3.0.+'
    implementation 'org.springframework.boot:spring-boot-starter-oauth2-resource-server'
    implementation 'org.springframework.boot:spring-boot-starter-oauth2-client'
    implementation 'org.springframework.boot:spring-boot-starter-webflux'
    implementation 'net.logstash.logback:logstash-logback-encoder:7.2'

    implementation("com.example.shared:db-api:3.0.+") {
        exclude group: 'org.apache.logging.log4j'
    }
    implementation("com.example.shared:db-db2:3.0.+") {
        exclude group: 'org.apache.logging.log4j'
    }
    implementation("com.example.shared:db-oracle:3.0.+") {
        exclude group: 'org.apache.logging.log4j'
    }

    implementation 'com.ibm.db2.jcc:db2jcc4:4.31.10'
    implementation 'com.ibm.db2.jcc:db2jcc_license_cisuz:4.24.92'
    implementation 'com.example.shared:db-spring-boot-starter:1.0.+'
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.17.0'

    testImplementation 'org.springframework.boot:spring-boot-starter-test'
}

task wsdl2Java(type: JavaExec) {
    ext {
        outputDir = file("$buildDir/generated")
        classesDir = file("$buildDir/classes/java/main")
    }
    outputs.upToDateWhen { false }
    outputs.dir outputDir
    getMainClass().set('org.apache.cxf.tools.wsdlto.WSDLToJava')
    classpath = configurations.customTools
    args '-d', outputDir
    args '-classdir', classesDir
    args '-verbose'
    args '-validate'
    args '-wsdlLocation', 'wsdl/example.wsdl'
    args 'src/main/resources/wsdl/example.wsdl'
    doLast {
        println "[INFO] Client files generated"
    }
}

compileJava.dependsOn 'wsdl2Java'
sourceSets.main.java.srcDir "$buildDir/generated"

tasks.named('test') {
    useJUnitPlatform()
}